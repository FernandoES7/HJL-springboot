<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head>
    <title>Habitaciones - Hostal Boutique José Luis</title>
</head>
<body>
<main class="py-5">
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="section-title">Nuestras habitaciones</h1>
            <p class="section-subtitle mb-0">Explora nuestras opciones y encuentra la habitación ideal para ti</p>
        </div>

        <!-- Filtros -->
        <div class="filter-panel">
            <form th:action="@{/habitaciones}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="tipo" class="form-label fw-semibold small">Tipo de habitación</label>
                    <select id="tipo" name="tipo" class="form-select">
                        <option value="">Todos los tipos</option>
                        <option th:each="t : ${tipos}"
                                th:value="${t.idTipo}"
                                th:text="${t.nombre}"
                                th:selected="${filtroTipo != null and filtroTipo == t.idTipo}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="capacidadMin" class="form-label fw-semibold small">Capacidad mínima</label>
                    <select id="capacidadMin" name="capacidadMin" class="form-select">
                        <option value="">Cualquiera</option>
                        <option value="1" th:selected="${filtroCapacidad != null and filtroCapacidad == 1}">1 persona</option>
                        <option value="2" th:selected="${filtroCapacidad != null and filtroCapacidad == 2}">2 personas</option>
                        <option value="4" th:selected="${filtroCapacidad != null and filtroCapacidad == 4}">4 personas</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="precioMax" class="form-label fw-semibold small">Precio máximo (S/)</label>
                    <input type="number" id="precioMax" name="precioMax" class="form-control"
                           placeholder="Ej: 300" min="0" step="10"
                           th:value="${filtroPrecio}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary-custom w-100">
                        <i class="bi bi-funnel"></i> Filtrar
                    </button>
                </div>
            </form>
        </div>

        <!-- Resultados -->
        <div th:if="${#lists.isEmpty(habitaciones)}" class="text-center py-5 text-muted">
            <i class="bi bi-search display-4 d-block mb-3"></i>
            <p class="mb-0">No se encontraron habitaciones con los filtros seleccionados.</p>
            <a th:href="@{/habitaciones}" class="btn btn-outline-custom mt-3">Limpiar filtros</a>
        </div>

        <div class="row g-4" th:unless="${#lists.isEmpty(habitaciones)}">
            <div class="col-md-6 col-lg-4" th:each="hab : ${habitaciones}">
                <div class="room-card">
                    <img th:src="${hab.imagenUrl}" th:alt="${hab.nombre}" alt="Habitación">
                    <div class="room-card-body">
                        <h5 class="fw-bold" style="color:var(--primary)" th:text="${hab.nombre}">Habitación</h5>
                        <p class="text-muted small" th:text="${hab.descripcion}">Descripción</p>
                        <div class="d-flex flex-wrap gap-3 mt-3 mb-3">
                            <span class="text-muted small">
                                <i class="bi bi-people text-primary"></i>
                                Hasta <span th:text="${hab.capacidad}">1</span> personas
                            </span>
                            <span class="text-muted small">
                                <i class="bi bi-door-open text-primary"></i>
                                <span th:text="${hab.cantidadTotal}">1</span> disponibles
                            </span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="room-price"
                                  th:attr="data-pen-amount=${hab.precioBase}"
                                  data-pen-suffix=" / noche"
                                  th:text="'S/ ' + ${hab.precioBase} + ' / noche'">S/ 120 / noche</span>
                            <a th:href="@{/reservar}" class="btn btn-sm btn-primary-custom">Reservar</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
