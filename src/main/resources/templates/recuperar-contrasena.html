<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{::scripts})}">
<head>
    <title>Recuperar contraseña - Hostal Boutique José Luis</title>
</head>
<body>
<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h1 class="section-title h3">Recuperar contraseña</h1>
                        <p class="text-muted small mb-0">
                            Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
                        </p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/recuperar-contrasena}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-4">
                            <label for="recuperarEmail" class="form-label fw-semibold small">Correo electrónico</label>
                            <input type="email" id="recuperarEmail" name="email" class="form-control"
                                   th:value="${recuperarEmail}" placeholder="correo@email.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                            <i class="bi bi-envelope"></i> Enviar enlace de recuperación
                        </button>
                        <div class="text-center">
                            <a th:href="@{/login}" class="small text-decoration-none">
                                <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
