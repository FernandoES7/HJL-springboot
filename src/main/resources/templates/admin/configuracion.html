<!DOCTYPE html>
<html th:replace="~{admin/fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Configuración</title></head>
<body>
<section>
    <div class="row g-4">
        <div class="col-12 col-lg-8">
            <div class="form-section mb-4">
                <h5 class="form-section-title">
                    <i class="bi bi-building me-2" style="color:#1e3a6e;"></i>
                    Información del Hostal
                </h5>
                <form th:action="@{/admin/configuracion/guardar}" method="post">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label">Nombre del establecimiento</label>
                            <input type="text" class="form-control" name="nombreHostal"
                                   th:value="${nombreHostal}" required/>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Categoría</label>
                            <input type="text" class="form-control" th:value="${categoria}" readonly
                                   style="background:#f8fafc;color:#64748b;"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección</label>
                            <input type="text" class="form-control" name="direccion"
                                   th:value="${direccion}" required/>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Email de contacto</label>
                            <input type="email" class="form-control" name="emailContacto"
                                   th:value="${emailContacto}" required/>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" name="telefono"
                                   th:value="${telefono}"/>
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4 pt-3" style="border-top:1px solid #f1f5f9;">
                        <button type="submit" class="btn"
                                style="background:#1e3a6e;color:#fff;font-weight:600;padding:9px 24px;border-radius:8px;">
                            <i class="bi bi-check-lg me-1"></i> Guardar configuración
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="form-section">
                <h5 class="form-section-title">
                    <i class="bi bi-lightning-charge-fill me-2" style="color:#f59e0b;"></i>
                    Accesos rápidos
                </h5>
                <div class="d-flex flex-column gap-2">
                    <a th:href="@{/admin/habitaciones}" class="btn w-100 text-start"
                       style="background:#eff6ff;color:#1d4ed8;font-weight:600;border-radius:8px;">
                        <i class="bi bi-door-closed-fill me-2"></i> Habitaciones
                    </a>
                    <a th:href="@{/admin/reservas}" class="btn w-100 text-start"
                       style="background:#f0fdf4;color:#15803d;font-weight:600;border-radius:8px;">
                        <i class="bi bi-calendar-check-fill me-2"></i> Reservas
                    </a>
                    <a th:href="@{/admin/clientes}" class="btn w-100 text-start"
                       style="background:#fef9c3;color:#854d0e;font-weight:600;border-radius:8px;">
                        <i class="bi bi-people-fill me-2"></i> Clientes
                    </a>
                    <a th:href="@{/admin/reportes}" class="btn w-100 text-start"
                       style="background:#faf5ff;color:#6d28d9;font-weight:600;border-radius:8px;">
                        <i class="bi bi-bar-chart-fill me-2"></i> Reportes
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
