<!DOCTYPE html>
<html th:fragment="layout(title, content)"
      th:with="pageTitle=${#strings.substringBefore(#strings.substringAfter(title, '<title>'), '</title>')}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle} + ' - Hostal José Luis'">Panel Admin</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <script th:src="@{/js/graficos.js}"></script>
</head>
<body>

<div class="admin-wrapper">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-avatar">JL</div>
            <div class="sidebar-brand-text">
                <div class="brand-title">Panel Admin</div>
                <div class="brand-subtitle">Hostal José Luis</div>
            </div>
        </div>

        <div class="sidebar-nav">
            <div class="nav-label">Principal</div>
            <a th:href="@{/admin/dashboard}"
               th:classappend="${seccionActiva == 'dashboard'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <div class="nav-label mt-2">Gestión</div>
            <a th:href="@{/admin/habitaciones}"
               th:classappend="${seccionActiva == 'habitaciones'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-door-closed-fill"></i>
                <span>Habitaciones</span>
            </a>
            <a th:href="@{/admin/tipos-habitacion}"
               th:classappend="${seccionActiva == 'tiposHabitacion'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-tags-fill"></i>
                <span>Tipos de Habitación</span>
            </a>
            <a th:href="@{/admin/reservas}"
               th:classappend="${seccionActiva == 'reservas'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-calendar-check-fill"></i>
                <span>Reservas</span>
            </a>
            <a th:href="@{/admin/clientes}"
               th:classappend="${seccionActiva == 'clientes'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-people-fill"></i>
                <span>Clientes</span>
            </a>

            <div class="nav-label mt-2">Gráficos</div>
            <a th:href="@{/admin/reportes}"
               th:classappend="${seccionActiva == 'reportes'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-bar-chart-fill"></i>
                <span>Reportes</span>
            </a>

            <div class="nav-label mt-2">Sistema</div>
            <a th:href="@{/admin/configuracion}"
               th:classappend="${seccionActiva == 'configuracion'} ? 'active' : ''"
               class="nav-link">
                <i class="bi bi-gear-fill"></i>
                <span>Configuración</span>
            </a>
        </div>

        <div style="padding: 16px; border-top: 1px solid rgba(255,255,255,0.08);">
            <a th:href="@{/inicio}" class="nav-link" style="margin-bottom:8px;">
                <i class="bi bi-house-door"></i>
                <span>Sitio público</span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-start">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Cerrar sesión</span>
                </button>
            </form>
        </div>
    </nav>

    <div class="main-content">
        <div class="topbar">
            <h1 class="topbar-title" th:text="${pageTitle}">Dashboard</h1>
            <div class="topbar-right">
                <span class="topbar-user" th:if="${usuarioSesion != null}">
                    <i class="bi bi-person-circle" style="font-size:20px; color:#1e3a6e;"></i>
                    <span th:text="${usuarioSesion.nombre}">Administrador</span>
                </span>
            </div>
        </div>

        <div class="page-content">
            <div th:if="${mensajeExito}" class="alert-success-custom mb-3">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${mensajeExito}"></span>
            </div>
            <div th:if="${mensajeError}" class="alert-error-custom mb-3">
                <i class="bi bi-x-circle-fill me-2"></i>
                <span th:text="${mensajeError}"></span>
            </div>
            <th:block th:replace="${content}"/>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
