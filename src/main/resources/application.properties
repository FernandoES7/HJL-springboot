spring.application.name=hostal

spring.config.import=optional:file:.env[.properties]

# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Puerto
server.port=${PORT:${SERVER_PORT:8080}}

# URL base
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail.from-name=${MAIL_FROM_NAME:Hostal Boutique José Luis}

# Exchange Rate API
app.exchange-rate.api-url=${EXCHANGE_RATE_API_URL:https://v6.exchangerate-api.com/v6/}
app.exchange-rate.api-key=${EXCHANGE_RATE_API_KEY}

# Gmail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true